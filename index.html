<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pickleball Match Maker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PB Match">
<link rel="apple-touch-icon" href="icon.svg">
<style>

  :root {
    --primary: #059669;
    --primary-mid: #10b981;
    --primary-light: #d1fae5;
    --primary-pale: #ecfdf5;
    --accent: #f59e0b;
    --accent-light: #fef3c7;
    --blue: #3b82f6;
    --blue-light: #dbeafe;
    --red: #ef4444;
    --purple: #8b5cf6;
    --bg: #f8fafb;
    --card: #ffffff;
    --text: #0f172a;
    --text-mid: #475569;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: max(60px, env(safe-area-inset-bottom, 60px));
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Header ===== */
  header {
    background: linear-gradient(160deg, #022c22 0%, #064e3b 25%, #059669 60%, #34d399 100%);
    color: white;
    text-align: center;
    padding: 52px 20px 56px;
    position: relative;
    overflow: hidden;
    border-radius: 0 0 36px 36px;
  }

  header::before {
    content: '';
    position: absolute;
    top: -100px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -50px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
    border-radius: 50%;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    position: relative;
    line-height: 1.2;
  }

  header p {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-top: 6px;
    position: relative;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* ===== Container ===== */
  .container {
    max-width: 560px;
    margin: -28px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }

  /* ===== Card ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-title {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-light);
    margin-bottom: 20px;
  }

  /* ===== Settings Row ===== */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border-light);
  }

  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }

  .setting-label small {
    display: block;
    font-weight: 500;
    font-size: 0.75rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* ===== Stepper ===== */
  .stepper {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--border-light);
    border-radius: 14px;
    padding: 4px;
  }

  .stepper button {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: none;
    background: transparent;
    color: var(--text-mid);
    font-size: 1.3rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stepper button:hover {
    background: white;
    color: var(--primary);
    box-shadow: var(--shadow-sm);
  }

  .stepper button:active {
    transform: scale(0.9);
  }

  .stepper .value {
    width: 48px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text);
  }

  /* ===== Generate Button ===== */
  .generate-btn {
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, #059669, #10b981);
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 6px 20px rgba(5, 150, 105, 0.3);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .generate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(5, 150, 105, 0.35);
  }

  .generate-btn:active {
    transform: translateY(0) scale(0.98);
  }

  /* ===== Results ===== */
  #results {
    margin-top: 12px;
  }

  .round-header {
    text-align: center;
    margin: 28px 0 16px;
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .round-header::before,
  .round-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .round-pill {
    display: inline-block;
    background: linear-gradient(135deg, #059669, #0d9488);
    color: white;
    padding: 7px 22px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
    box-shadow: 0 2px 10px rgba(5, 150, 105, 0.3);
  }

  /* ===== Court Card ===== */
  .court-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px 24px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    animation: courtPop 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    position: relative;
    border-left: 6px solid transparent;
  }

  .court-card.court-0 { border-left-color: #10b981; }
  .court-card.court-1 { border-left-color: #3b82f6; }
  .court-card.court-2 { border-left-color: #f59e0b; }
  .court-card.court-3 { border-left-color: #ef4444; }
  .court-card.court-4 { border-left-color: #8b5cf6; }
  .court-card.court-5 { border-left-color: #ec4899; }
  .court-card.court-6 { border-left-color: #14b8a6; }
  .court-card.court-7 { border-left-color: #f97316; }
  .court-card.court-8 { border-left-color: #6366f1; }
  .court-card.court-9 { border-left-color: #84cc16; }

  @keyframes courtPop {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .court-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .court-badge {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .court-badge-0 { background: linear-gradient(135deg, #10b981, #34d399); }
  .court-badge-1 { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
  .court-badge-2 { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
  .court-badge-3 { background: linear-gradient(135deg, #ef4444, #f87171); }
  .court-badge-4 { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
  .court-badge-5 { background: linear-gradient(135deg, #ec4899, #f472b6); }
  .court-badge-6 { background: linear-gradient(135deg, #14b8a6, #2dd4bf); }
  .court-badge-7 { background: linear-gradient(135deg, #f97316, #fb923c); }
  .court-badge-8 { background: linear-gradient(135deg, #6366f1, #818cf8); }
  .court-badge-9 { background: linear-gradient(135deg, #84cc16, #a3e635); }

  .court-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 0.2px;
  }

  .match-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .team {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .player-tag {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    font-weight: 800;
    animation: tagPop 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    box-shadow: var(--shadow-sm);
  }

  .team-a .player-tag {
    background: var(--primary-pale);
    color: var(--primary);
    border: 2px solid var(--primary-light);
  }

  .team-b .player-tag {
    background: #eff6ff;
    color: var(--blue);
    border: 2px solid var(--blue-light);
  }

  @keyframes tagPop {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .vs {
    font-weight: 900;
    font-size: 0.72rem;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 2px;
    background: var(--border-light);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 10px;
  }

  /* ===== Rest Card ===== */
  .rest-card {
    background: linear-gradient(135deg, #fffbeb, #fef3c7);
    border: 1px solid #fde68a;
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 12px;
    text-align: center;
    animation: courtPop 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .rest-card .rest-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #92400e;
    margin-bottom: 12px;
  }

  .rest-card .rest-players {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .rest-card .player-tag {
    background: white;
    color: #92400e;
    border: 2px solid #fde68a;
  }

  /* ===== Share ===== */
  .share-area {
    display: none;
    margin-top: 12px;
    margin-bottom: 4px;
  }

  .share-area.show {
    display: block;
  }

  .share-btn {
    width: 100%;
    padding: 16px;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
  }

  .share-btn:hover {
    background: var(--primary-pale);
    border-color: var(--primary-light);
    color: var(--primary);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }

  .share-btn:active {
    transform: scale(0.98);
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: inherit;
    box-shadow: var(--shadow-lg);
    z-index: 2000;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    backdrop-filter: blur(12px);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== Confetti ===== */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    animation: confettiFall 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* ===== Warning ===== */
  .warning-msg {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 12px;
    animation: shake 0.4s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ===== Pairs ===== */
  .pair-add-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .pair-input {
    width: 60px;
    height: 40px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    color: var(--text);
    background: var(--border-light);
    outline: none;
    transition: border-color 0.15s;
  }

  .pair-input:focus {
    border-color: var(--primary-mid);
  }

  .pair-and {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-light);
  }

  .pair-add-btn {
    height: 40px;
    padding: 0 16px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pair-add-btn:hover {
    background: var(--primary-mid);
  }

  .pair-add-btn:active {
    transform: scale(0.95);
  }

  .pair-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pair-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--purple);
    color: white;
    padding: 6px 10px 6px 14px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 700;
    animation: tagPop 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .pair-chip button {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    line-height: 1;
  }

  .pair-chip button:hover {
    background: rgba(255,255,255,0.45);
  }

  .pair-empty {
    font-size: 0.8rem;
    color: var(--text-light);
    font-weight: 500;
  }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    header { padding: 40px 20px 36px; }
    header h1 { font-size: 1.5rem; }
    .container { margin-top: -20px; }
    .card { padding: 22px; }
    .court-card { padding: 20px; }
    .match-row { gap: 10px; }
    .player-tag { width: 46px; height: 46px; font-size: 0.95rem; }
    .vs { padding: 4px 10px; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<header>
  <h1>ピックルボール乱数表</h1>
  <p>スマートマッチングシステム</p>
</header>

<div class="container">

  <div class="card" id="settingsCard">
    <div class="card-title">設定</div>

    <div class="setting-row">
      <div class="setting-label">
        コート数
        <small>使用するコートの数</small>
      </div>
      <div class="stepper">
        <button onclick="adjustCourts(-1)">-</button>
        <div class="value" id="courtCount">2</div>
        <button onclick="adjustCourts(1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        人数
        <small>参加する人の数</small>
      </div>
      <div class="stepper">
        <button onclick="adjustPlayers(-1)">-</button>
        <div class="value" id="playerCount">8</div>
        <button onclick="adjustPlayers(1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        ラウンド数
        <small>生成するラウンドの数</small>
      </div>
      <div class="stepper">
        <button onclick="adjustRounds(-1)">-</button>
        <div class="value" id="roundCount">3</div>
        <button onclick="adjustRounds(1)">+</button>
      </div>
    </div>
  </div>

  <div class="card" id="pairCard">
    <div class="card-title">ペア固定</div>
    <div class="pair-add-row">
      <input type="number" class="pair-input" id="pairA" min="1" placeholder="No.">
      <span class="pair-and">と</span>
      <input type="number" class="pair-input" id="pairB" min="1" placeholder="No.">
      <button class="pair-add-btn" onclick="addPair()">追加</button>
    </div>
    <div class="pair-list" id="pairList">
      <span class="pair-empty">ペアなし</span>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="21" y2="21"/></svg>
    組み合わせを生成する
  </button>

  <div class="share-area" id="shareArea">
    <button class="share-btn" onclick="shareResults()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      共有リンクをコピー
    </button>
  </div>

  <div id="results"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let courts = 2;
  let players = 8;
  let rounds = 3;
  let lastResults = null;
  let fixedPairs = [];

  function adjustCourts(d) {
    courts = Math.max(1, Math.min(10, courts + d));
    document.getElementById('courtCount').textContent = courts;
    syncPlayers();
  }

  function adjustPlayers(d) {
    players = Math.max(4, Math.min(40, players + d));
    document.getElementById('playerCount').textContent = players;
  }

  function adjustRounds(d) {
    rounds = Math.max(1, Math.min(20, rounds + d));
    document.getElementById('roundCount').textContent = rounds;
  }

  function syncPlayers() {
    const minPlayers = courts * 4;
    if (players < minPlayers) {
      players = minPlayers;
      document.getElementById('playerCount').textContent = players;
    }
  }

  // --- Pair management ---
  function addPair() {
    const a = parseInt(document.getElementById('pairA').value);
    const b = parseInt(document.getElementById('pairB').value);
    if (!a || !b || a === b || a < 1 || b < 1 || a > 40 || b > 40) {
      showToast('正しい番号を入力してください');
      return;
    }
    const key = [Math.min(a, b), Math.max(a, b)];
    if (fixedPairs.some(p => p[0] === key[0] && p[1] === key[1])) {
      showToast('このペアは既に追加済みです');
      return;
    }
    if (fixedPairs.some(p => p[0] === a || p[1] === a || p[0] === b || p[1] === b)) {
      showToast('同じ番号を複数のペアに入れることはできません');
      return;
    }
    fixedPairs.push(key);
    document.getElementById('pairA').value = '';
    document.getElementById('pairB').value = '';
    renderPairs();
  }

  function removePair(idx) {
    fixedPairs.splice(idx, 1);
    renderPairs();
  }

  function renderPairs() {
    const list = document.getElementById('pairList');
    if (fixedPairs.length === 0) {
      list.innerHTML = '<span class="pair-empty">ペアなし</span>';
      return;
    }
    list.innerHTML = fixedPairs.map((p, i) =>
      '<span class="pair-chip">' + p[0] + ' & ' + p[1] +
      '<button onclick="removePair(' + i + ')">✕</button></span>'
    ).join('');
  }

  function getCourtName(i) {
    return (i + 1) + '番コート';
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generate() {
    const nums = [];
    for (let i = 1; i <= players; i++) nums.push(i);

    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    const playersPerRound = courts * 4;

    if (nums.length < playersPerRound) {
      resultsDiv.innerHTML = '<div class="warning-msg">人数がコート数に対して足りません（最低 ' + playersPerRound + '人必要）</div>';
      document.getElementById('shareArea').classList.remove('show');
      return;
    }

    // Validate pairs against player count
    const invalidPair = fixedPairs.find(p => p[0] > players || p[1] > players);
    if (invalidPair) {
      resultsDiv.innerHTML = '<div class="warning-msg">ペア ' + invalidPair[0] + ' & ' + invalidPair[1] + ' の番号が人数を超えています</div>';
      document.getElementById('shareArea').classList.remove('show');
      return;
    }

    lastResults = { c: courts, p: players, r: rounds, pairs: fixedPairs.slice(), rounds: [] };
    launchConfetti();

    // ── 試合数均等保証：残り休み回数を事前計算 ──────────────────────────────
    // 考え方: 「各プレイヤーが何回休むか」を最初に決め切ることで、
    //         全ラウンド終了時の試合数差を数学的に最大1に保証する。
    //
    // totalRestSlots = restPerRound × R を全員で均等分配。
    //   restsLow  = floor(totalRestSlots / N) … 大多数のプレイヤーの休み回数
    //   restsLow+1                             … numHighRest 人だけ1回多く休む
    // → 試合数 = R - 休み回数 なので、差は必ず最大1。
    const restPerRound = Math.max(0, nums.length - playersPerRound);
    const totalRestSlots = restPerRound * rounds;
    const restsLow = Math.floor(totalRestSlots / nums.length);
    const numHighRest = totalRestSlots % nums.length;

    const shuffledForRest = shuffle(nums.slice());
    const remainingRests = {};
    shuffledForRest.forEach((p, i) => {
      remainingRests[p] = i < numHighRest ? restsLow + 1 : restsLow;
    });

    // 固定ペアは2人の残り休み回数を揃える（原子単位で動かすため）
    for (const [a, b] of fixedPairs) {
      const avg = Math.round((remainingRests[a] + remainingRests[b]) / 2);
      remainingRests[a] = avg;
      remainingRests[b] = avg;
    }

    // コート履歴・対戦履歴の初期化
    const courtHistory = {};
    nums.forEach(n => { courtHistory[n] = new Array(courts).fill(0); });

    const opponentHist = {};
    const teammateHist = {};
    function pairKey(a, b) { return Math.min(a, b) + '-' + Math.max(a, b); }
    function addHist(hist, a, b) { const k = pairKey(a, b); hist[k] = (hist[k] || 0) + 1; }

    const pairedPlayerSet = new Set(fixedPairs.flat());
    let prevResting = [];

    for (let r = 0; r < rounds; r++) {
      const roundsLeft = rounds - r; // このラウンドを含む残ラウンド数

      // ── Step 1: 休みの選出（連続休み禁止 + 試合数均等を絶対保証）──────────
      // selectResting が「緊急度」に基づいて最適な休みを選ぶ。
      // 休みが決まったら remainingRests を1減らして次ラウンドの判断に反映。
      const resting = selectResting(nums, fixedPairs, prevResting, remainingRests, roundsLeft, restPerRound);
      resting.forEach(p => remainingRests[p]--);
      const playing = nums.filter(p => !resting.includes(p));

      // ── Step 2: チーム編成（Bitmask DP）────────────────────────────────────
      const playSet = new Set(playing);
      const activePairs = fixedPairs.filter(p => playSet.has(p[0]) && playSet.has(p[1]));
      const pairedSet = new Set(activePairs.flat());
      const singles = shuffle(playing.filter(n => !pairedSet.has(n)));

      const teams = shuffle(activePairs).slice();
      for (const pair of formTeams(singles, teammateHist, courtHistory, courts)) {
        teams.push(pair);
      }

      // ── Step 3: 対戦カード編成（Bitmask DP）─────────────────────────────────
      const courtMatchups = formMatchups(teams, opponentHist, courtHistory, courts);

      // ── Step 4: コート割り当て（Bitmask DP）─────────────────────────────────
      const orderedMatchups = assignMatchupsToCourts(courtMatchups, courtHistory, courts);

      // ── Step 5: コート履歴を更新 ──────────────────────────────────────────
      for (let c = 0; c < courts; c++) {
        for (const p of [...orderedMatchups[c][0], ...orderedMatchups[c][1]]) {
          courtHistory[p][c]++;
        }
      }

      // ── Step 6: ラウンド出力 & ペア・対戦履歴を更新 ──────────────────────
      const roundOrder = [];
      for (const [t1, t2] of orderedMatchups) {
        if (Math.random() < 0.5) {
          roundOrder.push(t1[0], t1[1], t2[0], t2[1]);
        } else {
          roundOrder.push(t2[0], t2[1], t1[0], t1[1]);
        }
        for (const a of t1) for (const b of t2) addHist(opponentHist, a, b);
        addHist(teammateHist, t1[0], t1[1]);
        addHist(teammateHist, t2[0], t2[1]);
      }
      roundOrder.push(...resting);

      prevResting = resting;

      lastResults.rounds.push(roundOrder);
      renderRound(resultsDiv, r, roundOrder);
    }

    document.getElementById('shareArea').classList.add('show');
    resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderRound(container, r, shuffled) {
    const header = document.createElement('div');
    header.className = 'round-header';
    header.innerHTML = '<span class="round-pill">Round ' + (r + 1) + '</span>';
    header.style.animationDelay = (r * 0.12) + 's';
    container.appendChild(header);

    let idx = 0;
    for (let c = 0; c < courts; c++) {
      const card = document.createElement('div');
      card.className = 'court-card court-' + (c % 10);
      card.style.animationDelay = (r * 0.12 + c * 0.06) + 's';

      const courtHeader = document.createElement('div');
      courtHeader.className = 'court-header';
      const courtBadge = document.createElement('span');
      courtBadge.className = 'court-badge court-badge-' + (c % 10);
      courtBadge.textContent = (c + 1);
      const courtLabel = document.createElement('span');
      courtLabel.className = 'court-label';
      courtLabel.textContent = getCourtName(c);
      courtHeader.appendChild(courtBadge);
      courtHeader.appendChild(courtLabel);

      const matchRow = document.createElement('div');
      matchRow.className = 'match-row';

      const teamA = document.createElement('div');
      teamA.className = 'team team-a';
      for (let p = 0; p < 2; p++) {
        const tag = document.createElement('span');
        tag.className = 'player-tag';
        tag.textContent = shuffled[idx++];
        tag.style.animationDelay = (r * 0.12 + c * 0.06 + p * 0.04) + 's';
        teamA.appendChild(tag);
      }

      const vs = document.createElement('span');
      vs.className = 'vs';
      vs.textContent = 'VS';

      const teamB = document.createElement('div');
      teamB.className = 'team team-b';
      for (let p = 0; p < 2; p++) {
        const tag = document.createElement('span');
        tag.className = 'player-tag';
        tag.textContent = shuffled[idx++];
        tag.style.animationDelay = (r * 0.12 + c * 0.06 + (p + 2) * 0.04) + 's';
        teamB.appendChild(tag);
      }

      matchRow.appendChild(teamA);
      matchRow.appendChild(vs);
      matchRow.appendChild(teamB);

      card.appendChild(courtHeader);
      card.appendChild(matchRow);
      container.appendChild(card);
    }

    if (idx < shuffled.length) {
      const restCard = document.createElement('div');
      restCard.className = 'rest-card';
      restCard.style.animationDelay = (r * 0.12 + courts * 0.06) + 's';

      const restLabel = document.createElement('div');
      restLabel.className = 'rest-label';
      restLabel.textContent = 'お休み';

      const restPlayers = document.createElement('div');
      restPlayers.className = 'rest-players';

      while (idx < shuffled.length) {
        const tag = document.createElement('span');
        tag.className = 'player-tag';
        tag.textContent = shuffled[idx++];
        tag.style.animationDelay = (r * 0.12 + courts * 0.06 + 0.04) + 's';
        restPlayers.appendChild(tag);
      }

      restCard.appendChild(restLabel);
      restCard.appendChild(restPlayers);
      container.appendChild(restCard);
    }
  }

  // ── 休みプレイヤー選出（試合数均等を絶対保証するコア関数）────────────────────
  // 【設計原理】
  //   remainingRests[p] = プレイヤーpが残り roundsLeft ラウンドで休まなければならない回数。
  //   これが維持される限り、全ラウンド終了時の試合数差は必ず最大1に収まる。
  //
  // 【分類ロジック】
  //   試合確定  : 前ラウンドで休んだ（連続休み禁止）OR remainingRests === 0（休み不要）
  //   休み確定  : remainingRests >= roundsLeft → 今すぐ休まないと残ラウンドで目標達成不能
  //   どちらでも: 上記以外 → 緊急度（remainingRests の大きい順）でソートして選出
  //
  // 【固定ペア】原子単位として扱う。ペアの一方が前ラウンド休んだら両方試合確定。
  //            緊急度はペア内の最大値を使用（保守的に判断）。
  function selectResting(allNums, fixedPairs, prevResting, remainingRests, roundsLeft, restPerRound) {
    if (restPerRound === 0) return [];

    const prevRestSet = new Set(prevResting);
    const inPair = new Set(fixedPairs.flat());

    // ユニット構築（固定ペアは原子単位）
    const units = [];
    for (const pair of fixedPairs) {
      const restedLast = pair.some(p => prevRestSet.has(p));
      const urg = Math.max(remainingRests[pair[0]], remainingRests[pair[1]]);
      units.push({ members: pair.slice(), restedLast, urg });
    }
    for (const p of allNums) {
      if (!inPair.has(p)) {
        units.push({ members: [p], restedLast: prevRestSet.has(p), urg: remainingRests[p] });
      }
    }

    // 分類
    const forcedRest = [];
    const flexible = [];
    for (const u of units) {
      if (u.restedLast || u.urg === 0) continue; // 試合確定
      if (u.urg >= roundsLeft) {
        forcedRest.push(u); // 休み確定（今すぐ休まないと後で詰まる）
      } else {
        flexible.push(u);
      }
    }

    // 緊急度の高い順にソート（同率はランダム）
    flexible.sort((a, b) => b.urg - a.urg || Math.random() - 0.5);

    const resting = [...forcedRest];
    let filled = resting.reduce((s, u) => s + u.members.length, 0);

    for (const u of flexible) {
      if (filled >= restPerRound) break;
      if (filled + u.members.length <= restPerRound) {
        resting.push(u);
        filled += u.members.length;
      }
    }

    return resting.flatMap(u => u.members);
  }

  // ── Step 1: Optimal team formation (singles → pairs) ──────────────────────────
  // Bitmask DP to pair singles into teams of 2.
  // Score per pair = teammate_history - alpha * court_similarity
  // court_similarity = Σ courtH[a][c]*courtH[b][c] across courts.
  // Pairing same-court-biased players together lets step 2+3 send them to
  // their deficient court as a unit, balancing both at once.
  function formTeams(singles, teammateHist, courtHistory, numCourts) {
    const n = singles.length;
    if (n === 0) return [];

    let maxImb = 0;
    for (const p of singles) {
      const cts = courtHistory[p], tot = cts.reduce((s, x) => s + x, 0);
      if (!tot) continue;
      maxImb = Math.max(maxImb, Math.max(...cts) - Math.min(...cts));
    }
    const alpha = maxImb >= 3 ? 1.5 : maxImb >= 2 ? 0.8 : maxImb >= 1 ? 0.4 : 0;

    if (n > 20) {
      // Greedy fallback for very large groups (courts > 5)
      const used = new Array(n).fill(false), out = [];
      for (let i = 0; i < n; i++) {
        if (used[i]) continue;
        let bj = -1, bs = Infinity;
        for (let j = i + 1; j < n; j++) {
          if (used[j]) continue;
          const k = Math.min(singles[i], singles[j]) + '-' + Math.max(singles[i], singles[j]);
          const s = teammateHist[k] || 0;
          if (s < bs || (s === bs && Math.random() < 0.4)) { bs = s; bj = j; }
        }
        if (bj === -1) break;
        used[i] = used[bj] = true;
        out.push([singles[i], singles[bj]]);
      }
      return out;
    }

    const size = 1 << n, INF = 1e15;
    const dp = new Float64Array(size).fill(INF);
    const fA = new Int8Array(size).fill(-1), fB = new Int8Array(size).fill(-1);
    dp[0] = 0;

    for (let mask = 0; mask < size; mask++) {
      if (dp[mask] >= INF) continue;
      let first = -1;
      for (let i = 0; i < n; i++) { if (!(mask & (1 << i))) { first = i; break; } }
      if (first === -1) continue;

      for (let j = first + 1; j < n; j++) {
        if (mask & (1 << j)) continue;
        const a = singles[first], b = singles[j];
        const k = Math.min(a, b) + '-' + Math.max(a, b);
        let score = teammateHist[k] || 0;
        if (alpha > 0) {
          let sim = 0;
          for (let c = 0; c < numCourts; c++) sim += courtHistory[a][c] * courtHistory[b][c];
          score -= alpha * sim;
        }
        const nm = mask | (1 << first) | (1 << j), cost = dp[mask] + score;
        if (cost < dp[nm] || (cost === dp[nm] && Math.random() < 0.5)) {
          dp[nm] = cost; fA[nm] = first; fB[nm] = j;
        }
      }
    }

    const out = []; let mask = size - 1;
    while (mask > 0) {
      const a = fA[mask], b = fB[mask];
      out.push([singles[a], singles[b]]);
      mask ^= (1 << a) | (1 << b);
    }
    return out;
  }

  // ── Step 2: Optimal matchup formation (teams → court matchups) ────────────────
  // Bitmask DP to pair teams into matchups.
  // Score = opponent_history - alpha * court_clarity
  // court_clarity = max(court_sums) - min(court_sums) for the 4 players.
  // High clarity means all 4 players share the same bias → court assignment DP
  // can route them to their collectively deficient court, fixing everyone at once.
  function formMatchups(teams, opponentHist, courtHistory, numCourts) {
    const n = teams.length;
    if (n === 0) return [];

    let maxImb = 0;
    for (const [p1, p2] of teams) {
      for (const p of [p1, p2]) {
        const cts = courtHistory[p], tot = cts.reduce((s, x) => s + x, 0);
        if (!tot) continue;
        maxImb = Math.max(maxImb, Math.max(...cts) - Math.min(...cts));
      }
    }
    const alpha = maxImb >= 3 ? 3.0 : maxImb >= 2 ? 1.5 : maxImb >= 1 ? 0.5 : 0;

    if (n > 16) {
      // Greedy fallback for large court counts
      const used = new Array(n).fill(false), out = [], nc = n / 2;
      for (let c = 0; c < nc; c++) {
        let bi = -1, bj = -1, bs = Infinity;
        for (let i = 0; i < n; i++) {
          if (used[i]) continue;
          for (let j = i + 1; j < n; j++) {
            if (used[j]) continue;
            let s = 0;
            for (const a of teams[i]) for (const b of teams[j]) {
              s += opponentHist[Math.min(a, b) + '-' + Math.max(a, b)] || 0;
            }
            if (s < bs || (s === bs && Math.random() < 0.3)) { bs = s; bi = i; bj = j; }
          }
        }
        used[bi] = used[bj] = true;
        out.push([teams[bi], teams[bj]]);
      }
      return out;
    }

    const size = 1 << n, INF = 1e15;
    const dp = new Float64Array(size).fill(INF);
    const fA = new Int8Array(size).fill(-1), fB = new Int8Array(size).fill(-1);
    dp[0] = 0;

    for (let mask = 0; mask < size; mask++) {
      if (dp[mask] >= INF) continue;
      let first = -1;
      for (let i = 0; i < n; i++) { if (!(mask & (1 << i))) { first = i; break; } }
      if (first === -1) continue;

      for (let j = first + 1; j < n; j++) {
        if (mask & (1 << j)) continue;
        let opp = 0;
        for (const a of teams[first]) for (const b of teams[j]) {
          opp += opponentHist[Math.min(a, b) + '-' + Math.max(a, b)] || 0;
        }
        let clarity = 0;
        if (alpha > 0) {
          const all = [...teams[first], ...teams[j]];
          const sums = Array.from({ length: numCourts }, (_, c) =>
            all.reduce((s, p) => s + courtHistory[p][c], 0)
          );
          clarity = Math.max(...sums) - Math.min(...sums);
        }
        const nm = mask | (1 << first) | (1 << j), cost = dp[mask] + opp - alpha * clarity;
        if (cost < dp[nm] || (cost === dp[nm] && Math.random() < 0.5)) {
          dp[nm] = cost; fA[nm] = first; fB[nm] = j;
        }
      }
    }

    const out = []; let mask = size - 1;
    while (mask > 0) {
      const a = fA[mask], b = fB[mask];
      out.push([teams[a], teams[b]]);
      mask ^= (1 << a) | (1 << b);
    }
    return out;
  }

  // Count number of set bits in x
  function popcount(x) {
    let c = 0;
    while (x) { c += x & 1; x >>>= 1; }
    return c;
  }

  // Optimally assign matchups to courts using bitmask DP (O(n^2 * 2^n), n = courts ≤ 10).
  // Cost for assigning matchup m to court c = total times players in m have been on court c.
  // Minimizing total cost = assigning under-represented players to the courts they've been on least.
  // This finds the globally optimal assignment vs. greedy which can pick suboptimal local choices.
  function assignMatchupsToCourts(matchups, courtHistory, numCourts) {
    if (numCourts === 1) return matchups.slice();
    const n = numCourts;

    // Build cost matrix
    const cost = matchups.map(([t1, t2]) => {
      const players = [...t1, ...t2];
      return Array.from({ length: n }, (_, c) =>
        players.reduce((s, p) => s + courtHistory[p][c], 0)
      );
    });

    // Bitmask DP: dp[mask] = min cost to assign the matchups indicated by bits in mask
    // to courts 0..popcount(mask)-1 (courts filled in order)
    const size = 1 << n;
    const dp = new Float64Array(size).fill(1e15);
    const from = new Int8Array(size).fill(-1);
    dp[0] = 0;

    for (let mask = 0; mask < size; mask++) {
      if (dp[mask] >= 1e15) continue;
      const court = popcount(mask);
      if (court >= n) continue;
      for (let m = 0; m < n; m++) {
        if (mask & (1 << m)) continue;
        const newMask = mask | (1 << m);
        const c = dp[mask] + cost[m][court];
        // Random tie-breaking prevents systematic bias when scores are equal
        if (c < dp[newMask] || (c === dp[newMask] && Math.random() < 0.5)) {
          dp[newMask] = c;
          from[newMask] = m;
        }
      }
    }

    // Reconstruct: result[courtIndex] = matchup
    const result = new Array(n);
    let mask = size - 1;
    for (let court = n - 1; court >= 0; court--) {
      const m = from[mask];
      result[court] = matchups[m];
      mask ^= (1 << m);
    }
    return result;
  }

  function launchConfetti() {
    const colors = ['#10b981', '#f59e0b', '#3b82f6', '#ef4444', '#8b5cf6', '#ec4899'];
    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 0.6 + 's';
      piece.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
      const size = 6 + Math.random() * 6;
      piece.style.width = size + 'px';
      piece.style.height = size + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 2500);
    }
  }

  // --- Share ---
  function buildResultsURL() {
    if (!lastResults) return '';
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(lastResults))));
    return location.origin + location.pathname + '?r=' + encoded;
  }

  function shareResults() {
    const url = buildResultsURL();
    if (!url) { showToast('先に組み合わせを生成してください'); return; }
    copyToClipboard(url, '共有リンクをコピーしました');
  }

  function copyToClipboard(text, msg) {
    navigator.clipboard.writeText(text).then(() => {
      showToast(msg);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(msg);
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // --- Load shared results ---
  function loadFromURL() {
    const params = new URLSearchParams(location.search);
    const r = params.get('r');
    if (!r) return;

    try {
      const json = decodeURIComponent(escape(atob(r)));
      const data = JSON.parse(json);

      courts = data.c;
      players = data.p;
      rounds = data.r;

      document.getElementById('settingsCard').style.display = 'none';
      document.getElementById('pairCard').style.display = 'none';
      document.querySelector('.generate-btn').style.display = 'none';

      lastResults = data;

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      for (let i = 0; i < data.rounds.length; i++) {
        renderRound(resultsDiv, i, data.rounds[i]);
      }

    } catch (e) {}
  }

  loadFromURL();

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
