<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pickleball Match Maker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PB Match">
<link rel="apple-touch-icon" href="icon.svg">
<style>

  :root {
    --primary: #059669;
    --primary-mid: #10b981;
    --primary-light: #d1fae5;
    --primary-pale: #ecfdf5;
    --accent: #f59e0b;
    --accent-light: #fef3c7;
    --blue: #3b82f6;
    --blue-light: #dbeafe;
    --red: #ef4444;
    --purple: #8b5cf6;
    --bg: #f8fafb;
    --card: #ffffff;
    --text: #0f172a;
    --text-mid: #475569;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Header ===== */
  header {
    background: linear-gradient(160deg, #064e3b 0%, #059669 40%, #34d399 100%);
    color: white;
    text-align: center;
    padding: 48px 20px 44px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -100px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -50px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
    border-radius: 50%;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    position: relative;
    line-height: 1.2;
  }

  header p {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-top: 6px;
    position: relative;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* ===== Container ===== */
  .container {
    max-width: 560px;
    margin: -24px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }

  /* ===== Card ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-title {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-light);
    margin-bottom: 20px;
  }

  /* ===== Settings Row ===== */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border-light);
  }

  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }

  .setting-label small {
    display: block;
    font-weight: 500;
    font-size: 0.75rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* ===== Stepper ===== */
  .stepper {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--border-light);
    border-radius: 14px;
    padding: 4px;
  }

  .stepper button {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: none;
    background: transparent;
    color: var(--text-mid);
    font-size: 1.3rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stepper button:hover {
    background: white;
    color: var(--primary);
    box-shadow: var(--shadow-sm);
  }

  .stepper button:active {
    transform: scale(0.9);
  }

  .stepper .value {
    width: 48px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text);
  }

  /* ===== Generate Button ===== */
  .generate-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #059669, #10b981);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 4px 16px rgba(5, 150, 105, 0.25);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.3px;
  }

  .generate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(5, 150, 105, 0.35);
  }

  .generate-btn:active {
    transform: translateY(0) scale(0.98);
  }

  /* ===== Results ===== */
  #results {
    margin-top: 12px;
  }

  .round-header {
    text-align: center;
    margin: 28px 0 16px;
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .round-header::before,
  .round-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .round-pill {
    display: inline-block;
    background: var(--text);
    color: white;
    padding: 6px 20px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ===== Court Card ===== */
  .court-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    animation: courtPop 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    position: relative;
    overflow: hidden;
  }

  .court-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
  }

  .court-card.court-0::before { background: linear-gradient(90deg, #10b981, #34d399); }
  .court-card.court-1::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .court-card.court-2::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .court-card.court-3::before { background: linear-gradient(90deg, #ef4444, #f87171); }
  .court-card.court-4::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
  .court-card.court-5::before { background: linear-gradient(90deg, #ec4899, #f472b6); }
  .court-card.court-6::before { background: linear-gradient(90deg, #14b8a6, #2dd4bf); }
  .court-card.court-7::before { background: linear-gradient(90deg, #f97316, #fb923c); }
  .court-card.court-8::before { background: linear-gradient(90deg, #6366f1, #818cf8); }
  .court-card.court-9::before { background: linear-gradient(90deg, #84cc16, #a3e635); }

  @keyframes courtPop {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .court-name {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-light);
    margin-bottom: 16px;
  }

  .match-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .team {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .player-tag {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 800;
    animation: tagPop 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    box-shadow: var(--shadow-sm);
  }

  .team-a .player-tag {
    background: var(--primary-pale);
    color: var(--primary);
    border: 2px solid var(--primary-light);
  }

  .team-b .player-tag {
    background: #eff6ff;
    color: var(--blue);
    border: 2px solid var(--blue-light);
  }

  @keyframes tagPop {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .vs {
    font-weight: 900;
    font-size: 0.7rem;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 2px;
    background: var(--border-light);
    padding: 6px 12px;
    border-radius: 8px;
  }

  /* ===== Rest Card ===== */
  .rest-card {
    background: var(--accent-light);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 12px;
    text-align: center;
    animation: courtPop 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .rest-card .rest-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #92400e;
    margin-bottom: 12px;
  }

  .rest-card .rest-players {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .rest-card .player-tag {
    background: white;
    color: #92400e;
    border: 2px solid #fde68a;
  }

  /* ===== Share ===== */
  .share-area {
    display: none;
    margin-top: 20px;
  }

  .share-area.show {
    display: block;
  }

  .share-btn {
    width: 100%;
    padding: 16px;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
  }

  .share-btn:hover {
    background: var(--primary-pale);
    border-color: var(--primary-light);
    color: var(--primary);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }

  .share-btn:active {
    transform: scale(0.98);
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 14px 28px;
    border-radius: 14px;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: inherit;
    box-shadow: var(--shadow-lg);
    z-index: 2000;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    backdrop-filter: blur(8px);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== Confetti ===== */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    animation: confettiFall 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* ===== Warning ===== */
  .warning-msg {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 12px;
    animation: shake 0.4s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ===== Pairs ===== */
  .pair-add-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .pair-input {
    width: 60px;
    height: 40px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    color: var(--text);
    background: var(--border-light);
    outline: none;
    transition: border-color 0.15s;
  }

  .pair-input:focus {
    border-color: var(--primary-mid);
  }

  .pair-and {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-light);
  }

  .pair-add-btn {
    height: 40px;
    padding: 0 16px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pair-add-btn:hover {
    background: var(--primary-mid);
  }

  .pair-add-btn:active {
    transform: scale(0.95);
  }

  .pair-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pair-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--purple);
    color: white;
    padding: 6px 10px 6px 14px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 700;
    animation: tagPop 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .pair-chip button {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    line-height: 1;
  }

  .pair-chip button:hover {
    background: rgba(255,255,255,0.45);
  }

  .pair-empty {
    font-size: 0.8rem;
    color: var(--text-light);
    font-weight: 500;
  }

  /* ===== Court Balance ===== */
  .balance-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 12px;
    margin-top: 8px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    overflow-x: auto;
  }

  .balance-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .balance-title-label {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-light);
  }

  .balance-legend {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-mid);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .balance-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    min-width: 200px;
  }

  .balance-table th {
    text-align: center;
    padding: 8px 6px;
    font-weight: 700;
    color: var(--text-mid);
    font-size: 0.72rem;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }

  .balance-table td {
    text-align: center;
    padding: 5px 4px;
    border-bottom: 1px solid var(--border-light);
    vertical-align: middle;
  }

  .balance-player-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary-pale);
    color: var(--primary);
    border: 2px solid var(--primary-light);
    font-weight: 800;
    font-size: 0.78rem;
  }

  .count-badge {
    display: inline-block;
    min-width: 28px;
    padding: 4px 6px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.8rem;
  }

  .count-high { background: #dcfce7; color: #166534; }
  .count-low  { background: #fee2e2; color: #991b1b; }
  .count-mid  { background: var(--border-light); color: var(--text-mid); }
  .count-zero { background: transparent; color: var(--text-light); font-weight: 500; }

  .balance-note {
    font-size: 0.72rem;
    color: var(--text-light);
    margin-top: 12px;
    font-weight: 500;
    text-align: center;
  }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    header { padding: 40px 20px 36px; }
    header h1 { font-size: 1.5rem; }
    .container { margin-top: -20px; }
    .card { padding: 22px; }
    .court-card { padding: 20px; }
    .match-row { gap: 10px; }
    .player-tag { width: 40px; height: 40px; font-size: 0.9rem; }
    .vs { padding: 4px 10px; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Pickleball Match Maker</h1>
  <p>RANDOM MATCH GENERATOR</p>
</header>

<div class="container">

  <div class="card" id="settingsCard">
    <div class="card-title">Settings</div>

    <div class="setting-row">
      <div class="setting-label">
        コート数
        <small>使用するコートの数</small>
      </div>
      <div class="stepper">
        <button onclick="adjustCourts(-1)">-</button>
        <div class="value" id="courtCount">2</div>
        <button onclick="adjustCourts(1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        人数
        <small>参加する人の数</small>
      </div>
      <div class="stepper">
        <button onclick="adjustPlayers(-1)">-</button>
        <div class="value" id="playerCount">8</div>
        <button onclick="adjustPlayers(1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        ラウンド数
        <small>生成するラウンドの数</small>
      </div>
      <div class="stepper">
        <button onclick="adjustRounds(-1)">-</button>
        <div class="value" id="roundCount">3</div>
        <button onclick="adjustRounds(1)">+</button>
      </div>
    </div>
  </div>

  <div class="card" id="pairCard">
    <div class="card-title">ペア固定</div>
    <div class="pair-add-row">
      <input type="number" class="pair-input" id="pairA" min="1" placeholder="No.">
      <span class="pair-and">と</span>
      <input type="number" class="pair-input" id="pairB" min="1" placeholder="No.">
      <button class="pair-add-btn" onclick="addPair()">追加</button>
    </div>
    <div class="pair-list" id="pairList">
      <span class="pair-empty">ペアなし</span>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()">
    組み合わせを生成する
  </button>

  <div id="results"></div>

  <div class="share-area" id="shareArea">
    <button class="share-btn" onclick="shareResults()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      共有リンクをコピー
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let courts = 2;
  let players = 8;
  let rounds = 3;
  let lastResults = null;
  let fixedPairs = [];

  function adjustCourts(d) {
    courts = Math.max(1, Math.min(10, courts + d));
    document.getElementById('courtCount').textContent = courts;
    syncPlayers();
  }

  function adjustPlayers(d) {
    players = Math.max(4, Math.min(40, players + d));
    document.getElementById('playerCount').textContent = players;
  }

  function adjustRounds(d) {
    rounds = Math.max(1, Math.min(20, rounds + d));
    document.getElementById('roundCount').textContent = rounds;
  }

  function syncPlayers() {
    const minPlayers = courts * 4;
    if (players < minPlayers) {
      players = minPlayers;
      document.getElementById('playerCount').textContent = players;
    }
  }

  // --- Pair management ---
  function addPair() {
    const a = parseInt(document.getElementById('pairA').value);
    const b = parseInt(document.getElementById('pairB').value);
    if (!a || !b || a === b || a < 1 || b < 1 || a > 40 || b > 40) {
      showToast('正しい番号を入力してください');
      return;
    }
    const key = [Math.min(a, b), Math.max(a, b)];
    if (fixedPairs.some(p => p[0] === key[0] && p[1] === key[1])) {
      showToast('このペアは既に追加済みです');
      return;
    }
    if (fixedPairs.some(p => p[0] === a || p[1] === a || p[0] === b || p[1] === b)) {
      showToast('同じ番号を複数のペアに入れることはできません');
      return;
    }
    fixedPairs.push(key);
    document.getElementById('pairA').value = '';
    document.getElementById('pairB').value = '';
    renderPairs();
  }

  function removePair(idx) {
    fixedPairs.splice(idx, 1);
    renderPairs();
  }

  function renderPairs() {
    const list = document.getElementById('pairList');
    if (fixedPairs.length === 0) {
      list.innerHTML = '<span class="pair-empty">ペアなし</span>';
      return;
    }
    list.innerHTML = fixedPairs.map((p, i) =>
      '<span class="pair-chip">' + p[0] + ' & ' + p[1] +
      '<button onclick="removePair(' + i + ')">✕</button></span>'
    ).join('');
  }

  function getCourtName(i) {
    return (i + 1) + '番コート';
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generate() {
    const nums = [];
    for (let i = 1; i <= players; i++) nums.push(i);

    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    const playersPerRound = courts * 4;

    if (nums.length < playersPerRound) {
      resultsDiv.innerHTML = '<div class="warning-msg">人数がコート数に対して足りません（最低 ' + playersPerRound + '人必要）</div>';
      document.getElementById('shareArea').classList.remove('show');
      return;
    }

    // Validate pairs against player count
    const invalidPair = fixedPairs.find(p => p[0] > players || p[1] > players);
    if (invalidPair) {
      resultsDiv.innerHTML = '<div class="warning-msg">ペア ' + invalidPair[0] + ' & ' + invalidPair[1] + ' の番号が人数を超えています</div>';
      document.getElementById('shareArea').classList.remove('show');
      return;
    }

    lastResults = { c: courts, p: players, r: rounds, pairs: fixedPairs.slice(), rounds: [] };
    launchConfetti();

    const restCount = {};
    nums.forEach(n => restCount[n] = 0);
    let prevResting = [];

    // Court balance tracking: courtHistory[player][courtIndex] = times on that court
    const courtHistory = {};
    nums.forEach(n => { courtHistory[n] = new Array(courts).fill(0); });

    // Track history
    const opponentHist = {};
    const teammateHist = {};
    function pairKey(a, b) { return Math.min(a, b) + '-' + Math.max(a, b); }
    function getHist(hist, a, b) { return hist[pairKey(a, b)] || 0; }
    function addHist(hist, a, b) { const k = pairKey(a, b); hist[k] = (hist[k] || 0) + 1; }

    // Build scheduling units: fixed pairs as one unit, others as individuals
    const pairedPlayerSet = new Set(fixedPairs.flat());
    const soloPlayers = nums.filter(n => !pairedPlayerSet.has(n));

    for (let r = 0; r < rounds; r++) {
      const restSlots = nums.length - playersPerRound;
      let playing = [];
      let resting = [];

      if (restSlots <= 0) {
        playing = nums.slice();
      } else {
        // Treat fixed pairs as atomic units for rest scheduling
        // Use average rest per member so pairs and solos are compared fairly
        const units = [];
        for (const pair of fixedPairs) {
          units.push({
            members: [pair[0], pair[1]],
            restAvg: (restCount[pair[0]] + restCount[pair[1]]) / 2,
            restedLast: prevResting.includes(pair[0]) || prevResting.includes(pair[1])
          });
        }
        for (const p of soloPlayers) {
          units.push({
            members: [p],
            restAvg: restCount[p],
            restedLast: prevResting.includes(p)
          });
        }

        // Units that rested last round must play
        const mustPlayUnits = units.filter(u => u.restedLast);
        const otherUnits = shuffle(units.filter(u => !u.restedLast));
        // Sort others: higher rest avg → play first (they've rested more, should play)
        otherUnits.sort((a, b) => b.restAvg - a.restAvg);

        // Fill playing slots
        let playSlots = playersPerRound;
        const playUnits = [];
        const restUnits = [];

        for (const u of mustPlayUnits) {
          playUnits.push(u);
          playSlots -= u.members.length;
        }

        for (const u of otherUnits) {
          if (playSlots >= u.members.length) {
            playUnits.push(u);
            playSlots -= u.members.length;
          } else {
            restUnits.push(u);
          }
        }

        playing = playUnits.flatMap(u => u.members);
        resting = restUnits.flatMap(u => u.members);
      }

      // Build teams: fixed pairs stay, singles paired by least teammate history
      const playSet = new Set(playing);
      const activePairs = fixedPairs.filter(p => playSet.has(p[0]) && playSet.has(p[1]));
      const pairedSet = new Set(activePairs.flat());
      const singles = shuffle(playing.filter(n => !pairedSet.has(n)));

      const teams = shuffle(activePairs).slice();

      // Greedy teammate pairing for singles
      const sUsed = new Array(singles.length).fill(false);
      for (let i = 0; i < singles.length; i++) {
        if (sUsed[i]) continue;
        let bestJ = -1, bestScore = Infinity;
        for (let j = i + 1; j < singles.length; j++) {
          if (sUsed[j]) continue;
          const score = getHist(teammateHist, singles[i], singles[j]);
          if (score < bestScore || (score === bestScore && Math.random() < 0.4)) {
            bestScore = score;
            bestJ = j;
          }
        }
        sUsed[i] = true;
        sUsed[bestJ] = true;
        teams.push([singles[i], singles[bestJ]]);
      }

      // Greedy court assignment: minimize repeat opponents
      const tUsed = new Array(teams.length).fill(false);
      const courtMatchups = [];

      for (let c = 0; c < courts; c++) {
        let bestI = -1, bestJ = -1, bestScore = Infinity;
        for (let i = 0; i < teams.length; i++) {
          if (tUsed[i]) continue;
          for (let j = i + 1; j < teams.length; j++) {
            if (tUsed[j]) continue;
            let score = 0;
            for (const a of teams[i]) for (const b of teams[j]) score += getHist(opponentHist, a, b);
            if (score < bestScore || (score === bestScore && Math.random() < 0.3)) {
              bestScore = score;
              bestI = i;
              bestJ = j;
            }
          }
        }
        tUsed[bestI] = true;
        tUsed[bestJ] = true;
        courtMatchups.push([teams[bestI], teams[bestJ]]);
      }

      // Assign matchups to specific courts to balance each player's court exposure.
      // For each court slot, pick the matchup whose 4 players have the lowest total
      // play-count on that court (so under-represented players get priority).
      const matchupUsed = new Array(courtMatchups.length).fill(false);
      const orderedMatchups = [];

      for (let c = 0; c < courts; c++) {
        let bestM = -1, bestScore = Infinity;
        for (let m = 0; m < courtMatchups.length; m++) {
          if (matchupUsed[m]) continue;
          let score = 0;
          for (const p of [...courtMatchups[m][0], ...courtMatchups[m][1]]) {
            score += courtHistory[p][c];
          }
          if (score < bestScore || (score === bestScore && Math.random() < 0.5)) {
            bestScore = score;
            bestM = m;
          }
        }
        orderedMatchups.push(courtMatchups[bestM]);
        matchupUsed[bestM] = true;
      }

      // Update court history with this round's assignments
      for (let c = 0; c < courts; c++) {
        for (const p of [...orderedMatchups[c][0], ...orderedMatchups[c][1]]) {
          courtHistory[p][c]++;
        }
      }

      // Build round order and record history
      const roundOrder = [];
      for (const [t1, t2] of orderedMatchups) {
        if (Math.random() < 0.5) {
          roundOrder.push(t1[0], t1[1], t2[0], t2[1]);
        } else {
          roundOrder.push(t2[0], t2[1], t1[0], t1[1]);
        }
        for (const a of t1) for (const b of t2) addHist(opponentHist, a, b);
        addHist(teammateHist, t1[0], t1[1]);
        addHist(teammateHist, t2[0], t2[1]);
      }
      roundOrder.push(...resting);

      resting.forEach(n => restCount[n]++);
      prevResting = resting;

      lastResults.rounds.push(roundOrder);
      renderRound(resultsDiv, r, roundOrder);
    }

    if (courts >= 2) {
      renderCourtBalance(resultsDiv, courtHistory, courts, players);
    }

    document.getElementById('shareArea').classList.add('show');
    resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderRound(container, r, shuffled) {
    const header = document.createElement('div');
    header.className = 'round-header';
    header.innerHTML = '<span class="round-pill">Round ' + (r + 1) + '</span>';
    header.style.animationDelay = (r * 0.12) + 's';
    container.appendChild(header);

    let idx = 0;
    for (let c = 0; c < courts; c++) {
      const card = document.createElement('div');
      card.className = 'court-card court-' + (c % 10);
      card.style.animationDelay = (r * 0.12 + c * 0.06) + 's';

      const courtName = document.createElement('div');
      courtName.className = 'court-name';
      courtName.textContent = getCourtName(c);

      const matchRow = document.createElement('div');
      matchRow.className = 'match-row';

      const teamA = document.createElement('div');
      teamA.className = 'team team-a';
      for (let p = 0; p < 2; p++) {
        const tag = document.createElement('span');
        tag.className = 'player-tag';
        tag.textContent = shuffled[idx++];
        tag.style.animationDelay = (r * 0.12 + c * 0.06 + p * 0.04) + 's';
        teamA.appendChild(tag);
      }

      const vs = document.createElement('span');
      vs.className = 'vs';
      vs.textContent = 'VS';

      const teamB = document.createElement('div');
      teamB.className = 'team team-b';
      for (let p = 0; p < 2; p++) {
        const tag = document.createElement('span');
        tag.className = 'player-tag';
        tag.textContent = shuffled[idx++];
        tag.style.animationDelay = (r * 0.12 + c * 0.06 + (p + 2) * 0.04) + 's';
        teamB.appendChild(tag);
      }

      matchRow.appendChild(teamA);
      matchRow.appendChild(vs);
      matchRow.appendChild(teamB);

      card.appendChild(courtName);
      card.appendChild(matchRow);
      container.appendChild(card);
    }

    if (idx < shuffled.length) {
      const restCard = document.createElement('div');
      restCard.className = 'rest-card';
      restCard.style.animationDelay = (r * 0.12 + courts * 0.06) + 's';

      const restLabel = document.createElement('div');
      restLabel.className = 'rest-label';
      restLabel.textContent = 'お休み';

      const restPlayers = document.createElement('div');
      restPlayers.className = 'rest-players';

      while (idx < shuffled.length) {
        const tag = document.createElement('span');
        tag.className = 'player-tag';
        tag.textContent = shuffled[idx++];
        tag.style.animationDelay = (r * 0.12 + courts * 0.06 + 0.04) + 's';
        restPlayers.appendChild(tag);
      }

      restCard.appendChild(restLabel);
      restCard.appendChild(restPlayers);
      container.appendChild(restCard);
    }
  }

  function renderCourtBalance(container, courtHistory, numCourts, numPlayers) {
    const card = document.createElement('div');
    card.className = 'balance-card';

    const header = document.createElement('div');
    header.className = 'balance-header';
    header.innerHTML =
      '<div class="balance-title-label">コートバランス確認</div>' +
      '<div class="balance-legend">' +
        '<span class="legend-item"><span class="legend-dot" style="background:#dcfce7;border:1px solid #86efac"></span>多め</span>' +
        '<span class="legend-item"><span class="legend-dot" style="background:var(--border-light);border:1px solid var(--border)"></span>均等</span>' +
        '<span class="legend-item"><span class="legend-dot" style="background:#fee2e2;border:1px solid #fca5a5"></span>少なめ</span>' +
      '</div>';
    card.appendChild(header);

    const table = document.createElement('table');
    table.className = 'balance-table';

    // Header row
    const thead = document.createElement('thead');
    let hRow = '<tr><th>選手</th>';
    for (let c = 0; c < numCourts; c++) {
      hRow += '<th>' + getCourtName(c) + '</th>';
    }
    hRow += '<th>合計</th></tr>';
    thead.innerHTML = hRow;
    table.appendChild(thead);

    // Body rows
    const tbody = document.createElement('tbody');
    let hasAnyPlays = false;

    for (let p = 1; p <= numPlayers; p++) {
      const counts = courtHistory[p] || new Array(numCourts).fill(0);
      const total = counts.reduce((s, x) => s + x, 0);
      if (total === 0) continue;
      hasAnyPlays = true;

      // Expected plays per court for this player (they may have different totals due to resting)
      const avgPerCourt = total / numCourts;

      let row = '<tr><td><span class="balance-player-num">' + p + '</span></td>';
      for (let c = 0; c < numCourts; c++) {
        const count = counts[c];
        let cls;
        if (count === 0) {
          cls = 'count-zero';
        } else if (count >= avgPerCourt + 0.75) {
          cls = 'count-high';
        } else if (count <= avgPerCourt - 0.75) {
          cls = 'count-low';
        } else {
          cls = 'count-mid';
        }
        row += '<td><span class="count-badge ' + cls + '">' + count + '</span></td>';
      }
      row += '<td><span style="font-size:0.78rem;font-weight:700;color:var(--text-mid)">' + total + '</span></td></tr>';
      tbody.innerHTML += row;
    }

    if (!hasAnyPlays) return;

    table.appendChild(tbody);
    card.appendChild(table);

    const note = document.createElement('div');
    note.className = 'balance-note';
    note.textContent = '緑=平均より多い / グレー=均等 / 赤=平均より少ない';
    card.appendChild(note);

    container.appendChild(card);
  }

  function launchConfetti() {
    const colors = ['#10b981', '#f59e0b', '#3b82f6', '#ef4444', '#8b5cf6', '#ec4899'];
    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 0.6 + 's';
      piece.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
      const size = 6 + Math.random() * 6;
      piece.style.width = size + 'px';
      piece.style.height = size + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 2500);
    }
  }

  // --- Share ---
  function buildResultsURL() {
    if (!lastResults) return '';
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(lastResults))));
    return location.origin + location.pathname + '?r=' + encoded;
  }

  function shareResults() {
    const url = buildResultsURL();
    if (!url) { showToast('先に組み合わせを生成してください'); return; }
    copyToClipboard(url, '共有リンクをコピーしました');
  }

  function copyToClipboard(text, msg) {
    navigator.clipboard.writeText(text).then(() => {
      showToast(msg);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(msg);
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // --- Load shared results ---
  function loadFromURL() {
    const params = new URLSearchParams(location.search);
    const r = params.get('r');
    if (!r) return;

    try {
      const json = decodeURIComponent(escape(atob(r)));
      const data = JSON.parse(json);

      courts = data.c;
      players = data.p;
      rounds = data.r;

      document.getElementById('settingsCard').style.display = 'none';
      document.getElementById('pairCard').style.display = 'none';
      document.querySelector('.generate-btn').style.display = 'none';

      lastResults = data;

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      for (let i = 0; i < data.rounds.length; i++) {
        renderRound(resultsDiv, i, data.rounds[i]);
      }

      // Reconstruct courtHistory from stored round data for balance display
      if (data.c >= 2) {
        const ch = {};
        for (let p = 1; p <= data.p; p++) ch[p] = new Array(data.c).fill(0);
        for (const roundOrder of data.rounds) {
          for (let c = 0; c < data.c; c++) {
            for (let i = 0; i < 4; i++) {
              const player = roundOrder[c * 4 + i];
              if (player != null) ch[player][c]++;
            }
          }
        }
        renderCourtBalance(resultsDiv, ch, data.c, data.p);
      }
    } catch (e) {}
  }

  loadFromURL();

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
